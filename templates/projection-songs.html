<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <title>DXPR - Proyección Canti</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        /* ====== DXPR SONGS PROJECTION STYLES ====== */
        :root {
            --projection-bg: transparent;
            --projection-text: #ffffff;
            --projection-text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            --projection-accent: #3b82f6;
            --projection-muted: rgba(255, 255, 255, 0.8);
            --projection-chord: #f59e0b;
            --projection-lyric: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--projection-bg);
            color: var(--projection-text);
        }
        
        .projection-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 2rem;
            text-align: center;
            position: relative;
        }
        
        .song-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: var(--projection-accent);
            text-shadow: var(--projection-text-shadow);
            margin-bottom: 2rem;
            line-height: 1.2;
        }
        
        .song-content {
            font-size: clamp(1.25rem, 5vw, 2.5rem);
            font-weight: 400;
            line-height: 1.8;
            max-width: 90vw;
            text-shadow: var(--projection-text-shadow);
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
        }
        
        .song-chord {
            color: var(--projection-chord);
            font-weight: 600;
            margin-right: 0.5rem;
        }
        
        .song-lyric {
            color: var(--projection-lyric);
        }
        
        .song-section {
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .section-title {
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--projection-accent);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .slide-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-size: clamp(0.875rem, 3vw, 1.5rem);
            color: var(--projection-muted);
        }
        
        .slide-dots {
            display: flex;
            gap: 0.25rem;
        }
        
        .slide-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: var(--projection-muted);
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }
        
        .slide-dot.active {
            opacity: 1;
            background: var(--projection-accent);
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--projection-muted);
            text-align: center;
        }
        
        .empty-state .material-symbols-rounded {
            font-size: clamp(4rem, 15vw, 8rem);
            margin-bottom: 2rem;
            opacity: 0.5;
        }
        
        .empty-state h1 {
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .empty-state p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            opacity: 0.8;
        }
        
        /* Animation for slide appearance */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-content {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .projection-container {
                padding: 1rem;
            }
            
            .song-title {
                margin-bottom: 1.5rem;
            }
            
            .song-content {
                margin-bottom: 1.5rem;
            }
            
            .slide-indicator {
                bottom: 1rem;
            }
        }
        
        /* Print styles */
        @media print {
            .projection-container {
                height: auto;
                min-height: 100vh;
            }
            
            .slide-indicator {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="projection-container">
        <div class="slide-content" id="slide-content">
            <div class="empty-state">
                <span class="material-symbols-rounded">queue_music</span>
                <h1>DXPR - Proyección Canti</h1>
                <p>Esperando selección de canto...</p>
            </div>
        </div>
        
        <div class="slide-indicator" id="slide-indicator" style="display: none;">
            <span id="slide-text">Slide 1 de 1</span>
            <div class="slide-dots" id="slide-dots"></div>
        </div>
    </div>

    <script>
        // ====== SONGS PROJECTION SCRIPT ======
        
        const socket = io();
        const slideContent = document.getElementById('slide-content');
        const slideIndicator = document.getElementById('slide-indicator');
        const slideText = document.getElementById('slide-text');
        const slideDots = document.getElementById('slide-dots');
        
        let currentSong = null;
        let currentSlide = 0;
        let slides = [];
        
        // Socket event listeners
        socket.on('canto', (data) => {
            currentSong = data.song;
            currentSlide = data.slide || 0;
            slides = data.slides || [];
            displaySlide();
        });
        
        socket.on('ui_set_display_hidden', (data) => {
            if (data.hidden) {
                showEmptyState();
            } else if (currentSong) {
                displaySlide();
            }
        });
        
        socket.on('ui_estado', (state) => {
            if (state.display_hidden) {
                showEmptyState();
            }
        });
        
        // Request initial state
        socket.emit('ui_pedir_estado');
        
        function displaySlide() {
            if (!currentSong || slides.length === 0) {
                showEmptyState();
                return;
            }
            
            const slide = slides[currentSlide];
            if (!slide) {
                showEmptyState();
                return;
            }
            
            // Parse ChordPro content
            const parsedContent = parseChordPro(slide);
            
            // Create slide HTML
            const slideHTML = `
                <div class="song-title">${currentSong.title}</div>
                <div class="song-content">${parsedContent}</div>
            `;
            
            slideContent.innerHTML = slideHTML;
            
            // Update slide indicator
            updateSlideIndicator();
        }
        
        function parseChordPro(content) {
            if (!content) return '';
            
            // Split into lines
            const lines = content.split('\n');
            const parsedLines = [];
            
            lines.forEach(line => {
                if (line.trim() === '') {
                    parsedLines.push('<br>');
                    return;
                }
                
                // Check for section markers
                if (line.startsWith('{s:')) {
                    const sectionName = line.replace('{s:', '').replace('}', '').trim();
                    parsedLines.push(`<div class="song-section"><div class="section-title">${sectionName}</div>`);
                    return;
                }
                
                if (line.startsWith('{/s}')) {
                    parsedLines.push('</div>');
                    return;
                }
                
                // Parse chords and lyrics
                let parsedLine = line;
                
                // Replace chord markers [Chord] with styled spans
                parsedLine = parsedLine.replace(/\[([^\]]+)\]/g, '<span class="song-chord">$1</span>');
                
                // Replace other ChordPro directives
                parsedLine = parsedLine.replace(/\{[^}]+\}/g, '');
                
                if (parsedLine.trim()) {
                    parsedLines.push(`<div class="song-lyric">${parsedLine}</div>`);
                }
            });
            
            return parsedLines.join('');
        }
        
        function updateSlideIndicator() {
            if (slides.length <= 1) {
                slideIndicator.style.display = 'none';
                return;
            }
            
            slideIndicator.style.display = 'flex';
            slideText.textContent = `Slide ${currentSlide + 1} de ${slides.length}`;
            
            // Update dots
            slideDots.innerHTML = '';
            for (let i = 0; i < slides.length; i++) {
                const dot = document.createElement('div');
                dot.className = `slide-dot ${i === currentSlide ? 'active' : ''}`;
                slideDots.appendChild(dot);
            }
        }
        
        function showEmptyState() {
            slideContent.innerHTML = `
                <div class="empty-state">
                    <span class="material-symbols-rounded">queue_music</span>
                    <h1>DXPR - Proyección Canti</h1>
                    <p>Esperando selección de canto...</p>
                </div>
            `;
            slideIndicator.style.display = 'none';
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            // Recalculate font sizes if needed
        });
        
        // Handle fullscreen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                e.preventDefault();
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });
        
        // Auto-hide cursor after inactivity
        let cursorTimeout;
        function hideCursor() {
            document.body.style.cursor = 'none';
        }
        
        function showCursor() {
            document.body.style.cursor = 'default';
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(hideCursor, 3000);
        }
        
        document.addEventListener('mousemove', showCursor);
        document.addEventListener('click', showCursor);
        
        // Initialize
        hideCursor();
    </script>
</body>
</html>
