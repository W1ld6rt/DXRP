            /* Estilos para el toast */
            .toast {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background-color: #333;
                color: white;
                padding: 12px 20px;
                border-radius: 4px;

                justify-content: space-between;
                min-width: 250px;
                max-width: 80%;

            .toast.show {
                opacity: 1;

            .toast-message {

                margin-right: 10px;

            .toast-action-btn {
                background-color: rgba(255, 255, 255, 0.3);

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.error('SW error', err));
        }
        
        
        // Registro de errores generales - versión simplificada
        window.addEventListener('error', function(e) {
            console.error('Error capturado:', e.message, 'en', e.filename, 'línea', e.lineno);
            
            // Crear objeto de error simple
            const errorData = {
                message: e.message || 'Error desconocido',
                url: e.filename || window.location.href,
                line: e.lineno || 0,
                timestamp: Date.now(),
                type: 'runtime'
            };
            
            // Procesar el error si la función existe
            if (typeof processError === 'function') {
                processError(errorData);
            }
        });
        
        // Función centralizada para procesar errores
        function processError(errorObj) {
            // Almacenar errores recientes para evitar duplicados
            if (!window.recentErrors) {
                window.recentErrors = [];
            }
            
            // Comprobar si este error ya se ha mostrado recientemente
            const isDuplicate = window.recentErrors.some(e => 
                e.message === errorObj.message && 
                e.url === errorObj.url && 
                (Date.now() - e.timestamp) < 10000 // Evitar duplicados en 10 segundos
            );
            
            if (!isDuplicate) {
                // Agregar a errores recientes
                window.recentErrors.push(errorObj);
                
                // Actualizar panel de depuración si está visible
                if (window.dxprApp) {
                    window.dxprApp.updateDebugErrorList(errorObj);
                }
                
                // Mantener solo los 15 errores más recientes
                if (window.recentErrors.length > 15) {
                    window.recentErrors.shift();
                }
                
                // Mostrar notificación al usuario
                if (window.dxprApp && typeof window.dxprApp.showToast === 'function') {
                    window.dxprApp.showToast(`Error: ${errorObj.message}`, 'error', 5000);
                }
                
                // Enviar error al servidor para registro (si está disponible)
                if (window.dxprApp && window.dxprApp.socket && window.dxprApp.socket.connected) {
                    window.dxprApp.socket.emit('client_error', errorObj);
                }
                
                // Guardar en localStorage para persistencia
                try {
                    const savedErrors = JSON.parse(localStorage.getItem('dxpr_errors') || '[]');
                    savedErrors.push(errorObj);
                    // Mantener solo los 50 errores más recientes en localStorage
                    if (savedErrors.length > 50) {
                        savedErrors.splice(0, savedErrors.length - 50);
                    }
                    localStorage.setItem('dxpr_errors', JSON.stringify(savedErrors));
                } catch (e) {
                    console.error('Error al guardar errores en localStorage:', e);
                }
            }
        }
        
        // Registro de promesas rechazadas no manejadas
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Promesa rechazada no manejada:', event.reason);
            
            // Determinar el componente donde ocurrió el error
            let component = 'app';
            if (event.reason && event.reason.stack) {
                const stackLines = event.reason.stack.split('\n');
                for (const line of stackLines) {
                    for (const part of ['header', 'navigation', 'bible', 'songs', 'settings']) {
                        if (line.includes(part)) {
                            component = part;
                            break;
                        }
                    }
                    if (component !== 'app') break;
                }
            }
            
            // Crear objeto de error para la promesa rechazada
            const errorObj = {
                message: event.reason ? (event.reason.message || 'Promesa rechazada') : 'Promesa rechazada',
                stack: event.reason && event.reason.stack ? event.reason.stack : '',
                url: window.location.href,
                timestamp: Date.now(),
                type: 'promise',
                component: component
            };
            
            // Procesar el error
            processError(errorObj);
        });
        
        // Función para limpiar errores antiguos (más de 5 minutos)
        setInterval(() => {
            if (window.recentErrors && window.recentErrors.length > 0) {
                const fiveMinutesAgo = Date.now() - (5 * 60 * 1000);
                window.recentErrors = window.recentErrors.filter(e => e.timestamp > fiveMinutesAgo);
            }
        }, 60000); // Comprobar cada minuto
    </script>

    <!-- ========== MAIN APPLICATION ========== -->
    <link rel="preload" href="/static/js/performance-optimizer.js" as="script">
    <script src="/static/js/performance-optimizer.js"></script>
    <script>
        // ====== MAIN APPLICATION ======
        
        class DXPRApp {
            constructor() {
                this.components = {};
                this.currentView = 'bible';
                this.socket = null;
                this.initialized = false;
                this.connectionRetries = 0;
                this.maxRetries = 5;
                this.reconnectionAttempts = 0;
                this.lastActivity = new Date();
                this.debugPanelVisible = false;
                this.optimizer = window.performanceOptimizer;
                
                // Iniciar la aplicación después de un breve retraso para asegurar que el DOM esté listo
                setTimeout(() => this.init(), 100);
            }
            
            async init() {
                try {
                    console.log('Iniciando DXPR App...');
                    
                    // Mostrar pantalla de carga
                    this.showLoadingScreen();
                    
                    // Initialize Socket.IO con manejo de reconexión mejorado
                    this.socket = io({
                        transports: ['websocket', 'polling'],
                        timeout: 20000,
                        reconnection: true,
                        reconnectionAttempts: Infinity, // Intentar reconectar indefinidamente
                        reconnectionDelay: 1000,
                        reconnectionDelayMax: 5000, // Máximo retraso entre intentos
                        randomizationFactor: 0.5, // Factor de aleatorización para evitar reconexiones simultáneas
                        autoConnect: true
                    });
                    
                    // Mostrar estado de conexión en la interfaz
                    this.updateConnectionStatus('connecting');
                    
                    // Load components
                    await this.loadComponents();
                    
                    // Esperar a que el DOM esté completamente cargado
                    await new Promise(resolve => {
                        if (document.readyState === 'complete' || document.readyState === 'interactive') {
                            resolve();
                        } else {
                            document.addEventListener('DOMContentLoaded', () => resolve());
                        }
                    });
                    
                    // Inicializar componentes con un pequeño retraso para asegurar que todo esté cargado
                    setTimeout(() => {
                        this.initializeComponents();
                        // Setup event listeners después de inicializar componentes
                        this.setupEventListeners();
                        // Inicializar panel de depuración
                        this.initDebugPanel();
                        // Request initial state
                        if (this.socket.connected) {
                            this.socket.emit('ui_pedir_estado');
                        } else {
                            console.log('Socket no conectado, esperando conexión...');
                        }
                    }, 300);
                    
                    console.log('DXPR App inicialización en progreso...');
                } catch (error) {
                    console.error('Error initializing DXPR App:', error);
                    this.showToast('Error al inicializar la aplicación. Intentando recuperar...', 'error');
                    
                    // Intentar recuperarse del error
                    if (this.connectionRetries < this.maxRetries) {
                        this.connectionRetries++;
                        console.log(`Reintentando inicialización (${this.connectionRetries}/${this.maxRetries})...`);
                        setTimeout(() => this.init(), 2000);
                    } else {
                        this.showToast('No se pudo inicializar la aplicación después de varios intentos. Por favor, recarga la página.', 'error');
                    }
                }
            }
            
            loadScript(src) {
                // Use performance optimizer if available
                if (this.optimizer && this.optimizer.loadScriptOptimized) {
                    return this.optimizer.loadScriptOptimized(src);
                }
                
                // Fallback to original implementation
                return new Promise((resolve, reject) => {
                    console.log(`Cargando script: ${src}`);
                    
                    // Verificar si el script ya está cargado
                    const existingScript = document.querySelector(`script[src*="${src.split('?')[0]}"]`);
                    if (existingScript) {
                        console.log(`Script ya cargado: ${src}`);
                        resolve();
                        return;
                    }
                    
                    const script = document.createElement('script');
                    
                    // Only add timestamp in development
                    const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    if (isDev) {
                        const timestamp = new Date().getTime();
                        script.src = src.includes('?') ? `${src}&v=${timestamp}` : `${src}?v=${timestamp}`;
                    } else {
                        script.src = src;
                    }
                    
                    // Add performance attributes
                    script.async = true;
                    script.defer = true;
                    
                    // Establecer un tiempo límite para la carga del script
                    const timeout = setTimeout(() => {
                        console.warn(`Tiempo de espera agotado para cargar script: ${src}`);
                        reject(new Error(`Tiempo de espera agotado para cargar script: ${src}`));
                    }, 10000);
                    
                    script.onload = () => {
                        clearTimeout(timeout);
                        console.log(`Script cargado correctamente: ${src}`);
                        resolve();
                    };
                    
                    script.onerror = (error) => {
                        clearTimeout(timeout);
                        console.error(`Error al cargar script: ${src}`, error);
                        reject(new Error(`Error al cargar script: ${src}`));
                    };
                    
                    document.head.appendChild(script);
                });
            }
            
            async loadComponents() {
                try {
                    console.log('Iniciando carga de componentes HTML...');
                    // Los componentes ya están integrados en este archivo HTML
                    // No necesitamos cargar archivos externos
                    console.log('Componentes integrados - no se requiere carga externa');
                    
                    // Verificar que los contenedores existen
                    const containers = ['bible-container', 'songs-container', 'lower-third-container', 'settings-container'];
                    containers.forEach(containerId => {
                        const container = document.getElementById(containerId);
                        if (container) {
                            console.log(`✓ Contenedor ${containerId} encontrado`);
                        } else {
                            console.error(`❌ No se encontró el contenedor ${containerId}`);
                        }
                    });
                    
                    // Definir componentes a cargar
                    const components = [
                        { name: 'header', path: '/static/components/header/header.html' },
                        { name: 'navigation', path: '/static/components/navigation/navigation.html' },
                        { name: 'bible', path: '/static/components/bible/bible.html' },
                        { name: 'songs', path: '/static/components/songs/songs.html' },
                        { name: 'lower-third', path: '/static/components/lower-third/lower-third.html' },
                        { name: 'settings', path: '/static/components/settings/settings.html' }
                    ];
                    
                    // Cargar todos los componentes HTML en paralelo
                    const loadPromises = components.map(async (component) => {
                        try {
                            console.log(`Cargando componente HTML: ${component.name}`);
                            const response = await fetch(component.path, {
                                method: 'GET',
                                cache: 'no-cache', // Evitar problemas de caché
                                headers: {
                                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                                    'Pragma': 'no-cache',
                                    'Expires': '0'
                                }
                            });
                            
                            if (!response.ok) {
                                throw new Error(`Error al cargar ${component.name}: ${response.status} ${response.statusText}`);
                            }
                            
                            const html = await response.text();
                            console.log(`HTML recibido para ${component.name}: ${html.length} caracteres`);
                            
                            const container = document.getElementById(`${component.name}-container`);
                            
                            if (!container) {
                                throw new Error(`Contenedor no encontrado: ${component.name}-container`);
                            }
                            
                            container.innerHTML = html;
                            console.log(`Componente HTML cargado: ${component.name} - Contenido insertado: ${container.innerHTML.length} caracteres`);
                            
                            // Verificar si el HTML contiene elementos
                            const childElements = container.children.length;
                            console.log(`Elementos hijos en ${component.name}-container: ${childElements}`);
                            
                            if (childElements === 0) {
                                console.warn(`⚠️ El contenedor ${component.name}-container no tiene elementos hijos después de cargar el HTML`);
                            }
                            return { name: component.name, success: true };
                        } catch (err) {
                            console.error(`Error al cargar componente HTML ${component.name}:`, err);
                            return { name: component.name, success: false, error: err.message };
                        }
                    });
                    
                    // Esperar a que todos los componentes se carguen
                    const results = await Promise.all(loadPromises);
                    
                    // Verificar si todos los componentes se cargaron correctamente
                    const failedComponents = results.filter(r => !r.success);
                    
                    if (failedComponents.length > 0) {
                        const failedNames = failedComponents.map(c => c.name).join(', ');
                        console.warn(`${failedComponents.length} componentes HTML no se pudieron cargar: ${failedNames}`);
                        
                        if (typeof this.showToast === 'function') {
                            this.showToast(`Algunos componentes no se cargaron correctamente. Reintentando...`, 'warning');
                        }
                        
                        // Reintentar cargar los componentes fallidos después de un tiempo
                        setTimeout(() => this.loadComponents(), 2000);
                        return;
                    }

            updateConnectionStatus(status) {
                console.log(`Estado de conexión: ${status}`);
                
                // Actualizar la interfaz según el estado de conexión
                if (this.components.header) {
                    switch (status) {
                        case 'connected':
                            this.components.header.setConnectionStatus(true);
                            break;
                        case 'disconnected':
                        case 'error':
                            this.components.header.setConnectionStatus(false);
                            break;
                        case 'connecting':
                            // Podría mostrar un indicador de conexión en progreso
                            break;
                    }
                }
                
                // Si está desconectado o hay error, mostrar toast con opción de reconexión
                if (status === 'disconnected' || status === 'error') {
                    // Eliminar toast anterior si existe
                    const existingToast = document.querySelector('.toast.toast-error.connection-toast');
                    if (existingToast && existingToast.parentNode) {
                        existingToast.parentNode.removeChild(existingToast);
                    }
                    
                    // Crear nuevo toast con botón de reconexión
                    const message = status === 'error' ? 
                        'Error de conexión con el servidor' : 
                        'Desconectado del servidor';
                        
                    const toast = this.showToast(message, 'error', 0, {
                        text: 'Reconectar',
                        callback: () => this.reconnectManually(),
                        closeOnClick: false
                    });
                    
                    // Agregar clase para identificar este toast específico
                    if (toast) toast.classList.add('connection-toast');
                } else if (status === 'connected') {
                    // Si se conectó, eliminar el toast de error de conexión si existe
                    const connectionToast = document.querySelector('.toast.connection-toast');
                    if (connectionToast && connectionToast.parentNode) {
                        connectionToast.classList.remove('show');
                        setTimeout(() => {
                            if (connectionToast.parentNode) {
                                connectionToast.parentNode.removeChild(connectionToast);
                            }
                        }, 300);
                    }
                }
            };
            
            setupEventListeners() {
                if (!this.socket) return;
                
                // Socket.IO events con manejo mejorado
                this.socket.on('connect', () => {
                    console.log('Conectado al servidor');
                    this.updateConnectionStatus('connected');
                    this.showToast('Conectado al servidor', 'success');
                    
                    // Solicitar estado inicial al conectar
                    this.socket.emit('ui_pedir_estado');
                    
                    // Actualizar información de conexión en el panel de depuración
                    if (typeof this.updateDebugConnectionInfo === 'function') {
                        this.updateDebugConnectionInfo();
                    }
                });
                
                // Agregar evento de clic al indicador de estado de conexión
                document.addEventListener('DOMContentLoaded', () => {
                    const serverStatus = document.querySelector('.server-status');
                    if (serverStatus) {
                        serverStatus.addEventListener('click', () => {
                            // Solo intentar reconectar si no está conectado
                            if (!this.socket.connected) {
                                this.reconnectManually();
                            } else {
                                this.showToast('Ya estás conectado al servidor', 'info');
                            }
                        });
                    }
                });
                
                this.socket.on('disconnect', (reason) => {
                    console.log(`Desconectado del servidor. Razón: ${reason}`);
                    this.updateConnectionStatus('disconnected');
                    
                    // Mostrar mensaje según la razón de desconexión
                    if (reason === 'io server disconnect') {
                        // Desconexión iniciada por el servidor
                        this.showToast('El servidor cerró la conexión', 'warning');
                    } else if (reason === 'transport close') {
                        // Pérdida de conexión de red
                        this.showToast('Conexión perdida. Intentando reconectar...', 'warning');
                    } else {
                        this.showToast('Desconectado del servidor. Intentando reconectar...', 'warning');
                    }
                    
                    // Actualizar información de conexión en el panel de depuración
                    if (typeof this.updateDebugConnectionInfo === 'function') {
                        this.updateDebugConnectionInfo();
                    }
                });
                
                this.socket.on('connect_error', (error) => {
                    console.error('Error de conexión:', error);
                    this.updateConnectionStatus('error');
                    this.showToast('Error de conexión. Intentando reconectar...', 'error');
                });
                
                this.socket.on('reconnect', (attemptNumber) => {
                    console.log(`Reconectado al servidor después de ${attemptNumber} intentos`);
                    this.updateConnectionStatus('connected');
                    this.showToast('Reconectado al servidor', 'success');
                    
                    // Actualizar información de conexión en el panel de depuración

                    if (typeof this.updateDebugConnectionInfo === 'function') {
                        this.updateDebugConnectionInfo();
                    }
                });
                
                this.socket.on('reconnect_failed', () => {
                    console.error('Falló la reconexión después de todos los intentos');
                    this.updateConnectionStatus('error');
                    this.showToast('No se pudo reconectar al servidor. Por favor, recargue la página.', 'error', 10000);
                    
                    // Actualizar información de conexión en el panel de depuración

                this.socket.io.on('ping', () => {

                this.socket.io.on('pong', (latency) => {

            showToast(message, type = 'info', duration = 3000, action = null) {
                // Implementación mejorada de toast con posible acción
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                
                // Contenedor para el mensaje
                const messageEl = document.createElement('div');
                messageEl.className = 'toast-message';
                messageEl.textContent = message;
                toast.appendChild(messageEl);
                
                // Si hay una acción, agregar un botón
                if (action && typeof action.callback === 'function') {
                    const btn = document.createElement('button');
                    btn.className = 'toast-action-btn';
                    btn.textContent = action.text || 'Acción';
                    btn.addEventListener('click', () => {
                        action.callback();
                        // Opcionalmente cerrar el toast al hacer clic
                        if (action.closeOnClick !== false) {
                            toast.classList.remove('show');
                            setTimeout(() => {
                                if (toast.parentNode) {
                                    document.body.removeChild(toast);
                                }
                            }, 300);
                        }
                    });
                    toast.appendChild(btn);
                }
                
                document.body.appendChild(toast);
                
                // Mostrar el toast
                setTimeout(() => {
                    toast.classList.add('show');
                }, 10);
                
                // Ocultar y eliminar después de la duración
                if (duration !== 0) { // Si duration es 0, el toast no se cierra automáticamente
                    setTimeout(() => {
                        toast.classList.remove('show');
                        setTimeout(() => {
                            if (toast.parentNode) {
                                document.body.removeChild(toast);
                            }
                        }, 300);
                    }, duration);
                }
                
                return toast; // Devolver el elemento toast para posible referencia
            };
            
            reconnectManually() {

                if (this.socket) {
                    // Desconectar primero si ya hay una conexión
                    if (this.socket.connected) {
                        this.socket.disconnect();
                    }
                    
                    // Intentar reconectar
                    this.socket.connect();
                    this.updateConnectionStatus('connecting');
                    this.showToast('Intentando reconectar...', 'info');
                    
                    // Actualizar panel de depuración
                    this.updateDebugConnectionInfo();
                } else {
                    console.error('No hay objeto socket disponible para reconectar');
                    this.showToast('Error al reconectar. Recargue la página.', 'error');
                }
            };

                    this.debugPanelVisible = debugPanel.classList.contains('show');

                    if (show) {
                        debugPanel.classList.add('show');
                        this.debugPanelVisible = true;
                    } else {
                        debugPanel.classList.remove('show');
                        this.debugPanelVisible = false;
                    }
                }
                
                // Actualizar información si el panel está visible
                if (this.debugPanelVisible) {
                    this.updateDebugConnectionInfo();
                    this.updateDebugComponentStatus();
                }
            };
            
            switchDebugTab(tabName) {
                // Cambiar pestaña activa
                const tabButtons = document.querySelectorAll('.debug-tab-btn');
                const tabContents = document.querySelectorAll('.debug-tab-content');
                
                // Desactivar todas las pestañas
                tabButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(tab => tab.classList.remove('active'));
                
                // Activar la pestaña seleccionada
                document.querySelector(`.debug-tab-btn[data-tab="${tabName}"]`)?.classList.add('active');
                document.getElementById(`debug-${tabName}`)?.classList.add('active');
            };
            
            updateDebugErrorList(errorObj) {
                // Actualizar lista de errores en el panel de depuración
                if (!this.debugPanelVisible) return;
                
                const errorList = document.getElementById('error-list');
                if (!errorList) return;
                
                // Crear elemento de error
                const errorItem = document.createElement('div');
                errorItem.className = 'error-item';
                
                // Formatear fecha
                const date = new Date(errorObj.timestamp);
                const formattedDate = `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
                
                // Crear contenido del error
                errorItem.innerHTML = `
                    <div class="error-message">${errorObj.message}</div>
                    <div class="error-details">
                        <div class="error-header">
                            <span class="error-type">${errorObj.type}</span>
                            <span class="error-date">${formattedDate}</span>
                        </div>
                        <div class="error-info">
                            <strong>URL:</strong> ${errorObj.url}<br>
                            <strong>Componente:</strong> ${errorObj.component || 'Desconocido'}<br>
                        <pre>${errorObj.stack || 'No hay stack disponible'}</pre>
                    </div>
                `;
                
                // Agregar al principio de la lista
                errorList.insertBefore(errorItem, errorList.firstChild);
                
                // Limitar a 20 errores visibles
                while (errorList.children.length > 20) {
                    errorList.removeChild(errorList.lastChild);
                }
            };
            
            loadStoredErrors() {
                // Cargar errores almacenados en localStorage
                try {
                    const storedErrors = JSON.parse(localStorage.getItem('dxpr_errors') || '[]');
                    
                    // Mostrar errores en orden inverso (más recientes primero)
                    for (let i = storedErrors.length - 1; i >= 0; i--) {
                        this.updateDebugErrorList(storedErrors[i]);
                    }
                } catch (e) {
                    console.error('Error al cargar errores almacenados:', e);
                }
            };
            
            clearDebugErrors() {
                // Limpiar lista de errores
                const errorList = document.getElementById('error-list');
                if (errorList) {
                    errorList.innerHTML = '';
                }
                
                // Limpiar localStorage
                try {
                    localStorage.removeItem('dxpr_errors');
                    window.recentErrors = [];
                    this.showToast('Errores eliminados', 'success');
                } catch (e) {
                    console.error('Error al limpiar errores:', e);
                }
            };
            
            loadSavedErrors() {
                // Cargar errores guardados en localStorage
                try {
                    const savedErrors = JSON.parse(localStorage.getItem('dxpr_errors') || '[]');
                    if (savedErrors.length > 0) {
                        console.log(`Cargando ${savedErrors.length} errores guardados`);
                        
                        // Inicializar array de errores recientes si no existe
                        if (!window.recentErrors) {
                            window.recentErrors = [];
                        }
                        
                        // Añadir errores guardados a la lista de errores recientes
                        // pero solo los más recientes (máximo 15)
                        const recentSavedErrors = savedErrors.slice(-15);
                        for (const error of recentSavedErrors) {
                            // Evitar duplicados
                            if (!window.recentErrors.some(e => e.message === error.message && e.url === error.url)) {
                                window.recentErrors.push(error);
                                // Actualizar panel de depuración
                                this.updateDebugErrorList(error);
                            }
                        }
                    }
                } catch (e) {
                    console.error('Error al cargar errores guardados:', e);
                }
            };
            
            exportDebugErrors() {
                // Exportar errores a un archivo JSON
                if (!window.recentErrors || window.recentErrors.length === 0) {
                    this.showToast('No hay errores para exportar', 'warning');
                    return;
                }
                
                // Crear objeto con información adicional
                const exportData = {
                    appName: 'Bi-Ble',
                    exportDate: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    errors: window.recentErrors
                };
                
                // Convertir a JSON
                const jsonStr = JSON.stringify(exportData, null, 2);
                
                // Crear blob y enlace de descarga
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Crear enlace y forzar descarga
                const a = document.createElement('a');
                a.href = url;
                a.download = `bi-ble-errors-${new Date().toISOString().slice(0,19).replace(/[:.]/g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                
                // Limpiar
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                
                // Mostrar mensaje de confirmación
                this.showToast('Errores exportados correctamente', 'success');
            };
            
            updateDebugConnectionInfo() {
                // Actualizar información de conexión en el panel
                if (!this.debugPanelVisible) return;
                
                const socketStatus = document.getElementById('socketio-status');
                const obsStatus = document.getElementById('obs-connection-status');
                const reconnectAttempts = document.getElementById('reconnection-attempts');
                
                if (socketStatus) {
                    let status = 'Desconectado';
                    let color = '#F44336';
                    
                    if (this.socket) {
                        if (this.socket.connected) {
                            status = 'Conectado';
                            color = '#4CAF50';
                        } else if (this.socket.connecting) {
                            status = 'Conectando...';
                            color = '#FF9800';
                        }
                    }
                    
                    socketStatus.textContent = status;
                    socketStatus.style.color = color;
                }
                
                if (obsStatus && this.components.header) {
                    const isConnected = this.components.header.obsConnected;
                    obsStatus.textContent = isConnected ? 'Conectado' : 'Desconectado';
                    obsStatus.style.color = isConnected ? '#4CAF50' : '#F44336';
                }
                
                if (reconnectAttempts) {
                    reconnectAttempts.textContent = this.socket ? this.socket.io.reconnectionAttempts : 0;
                }
            };
            
            updateDebugComponentStatus() {
                // Actualizar estado de componentes en el panel
                if (!this.debugPanelVisible) return;
                
                const componentStatus = document.getElementById('component-status');
                if (!componentStatus) return;
                
                componentStatus.innerHTML = '';
                
                // Mostrar estado de cada componente
                for (const [name, component] of Object.entries(this.components)) {
                    const componentItem = document.createElement('div');
                    componentItem.className = 'component-item';
                    
                    const isLoaded = component !== null;
                    const statusClass = isLoaded ? 'component-loaded' : 'component-error';
                    const statusText = isLoaded ? 'Cargado' : 'Error';
                    
                    componentItem.innerHTML = `
                        <div>${name}</div>
                        <div class="${statusClass}">${statusText}</div>
                    `;
                    
                    componentStatus.appendChild(componentItem);
                }
            };
            
            reloadAllComponents() {
                // Recargar todos los componentes
                this.showToast('Recargando componentes...', 'info');
                
                // Limpiar componentes actuales
                this.components = {};
                
                // Recargar componentes
                this.loadComponents().then(() => {
                    this.showToast('Componentes recargados', 'success');
                    this.updateDebugComponentStatus();
                }).catch(error => {
                    console.error('Error al recargar componentes:', error);
                    this.showToast('Error al recargar componentes', 'error');
                });
            }
        }
        
        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.dxprApp = new DXPRApp();
        });
    </script>
</body>
</html>
