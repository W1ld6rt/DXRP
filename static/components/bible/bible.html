<!-- ====== BIBLE COMPONENT ====== -->
<div class="bible-layout">
        <!-- Panel Izquierdo -->
        <div class="bible-sidebar">
            <!-- Cronología -->
            <div class="sidebar-section">
                <div class="section-header">
                    <span class="material-symbols-rounded">history</span>
                    <h3>Cronologia Recente</h3>
                    <button class="btn-icon" id="clear-history" title="Limpiar historial">
                        <span class="material-symbols-rounded">delete_sweep</span>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <div class="empty-state">
                        <span class="material-symbols-rounded">history</span>
                        <p>Nessuna cronologia</p>
                    </div>
                </div>
            </div>
            
            <!-- Búsqueda -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Cerca</h3>
                </div>
                <div class="search-container">
                    <input type="text" autocomplete="off" id="bible-search" placeholder="Cerca libro, capitolo, versetto..." class="search-input"/>
                    <ul class="search-suggestions" id="search-suggestions"></ul>
                </div>
            </div>
            
            <!-- Navegación Bíblica -->
            <div class="sidebar-section navigation-section">
                <div class="bible-navigation">
                <!-- Libros -->
                <div class="nav-column">
                    <h4>Libri</h4>
                    <div class="nav-buttons" id="books-column"></div>
                </div>
                
                <!-- Capítulos -->
                <div class="nav-column">
                    <h4>Capitolo</h4>
                    <div class="nav-buttons" id="chapters-column"></div>
                </div>
                
                <!-- Versículos -->
                <div class="nav-column">
                    <h4>Versetto</h4>
                    <div class="nav-buttons" id="verses-column"></div>
                </div>
            </div>
        </div>
        </div>
        
        <!-- Panel Derecho - Preview -->
        <div class="bible-preview">
            <div class="preview-header">
                <h3 id="preview-reference">Bibbia</h3>
            </div>
            <div class="preview-content" id="preview-content">
                <div class="empty-state">
                    <span class="material-symbols-rounded">menu_book</span>
                    <p>Nessun versetto selezionato</p>
                </div>
            </div>
        </div>
    </div>
